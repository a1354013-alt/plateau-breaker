name: CI

on:
  push:
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps (for OpenAPI export)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt

      - name: Use Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (for OpenAPI codegen)
        working-directory: frontend
        run: npm ci --loglevel=error

      - name: Check API contract (OpenAPI -> generated types)
        run: python scripts/check_api_contract.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --loglevel=error

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --run --coverage

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Use Python (for packaging)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Release packaging smoke test
        run: |
          python scripts/make_release_zip.py --out-dir release
          python scripts/validate_release_zip.py --out-dir release

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt
          python -m pip install -r requirements-dev.txt -c constraints.txt

      - name: Lint
        working-directory: backend
        run: ruff check .

      - name: Migration smoke test (alembic upgrade head)
        working-directory: backend
        env:
          PLATEAUBREAKER_DB_PATH: ${{ runner.temp }}/plateaubreaker_ci.sqlite3
        run: |
          alembic -c alembic.ini upgrade head
          python -c "from sqlalchemy import inspect; from app.database import engine; assert inspect(engine).get_table_names(), 'No tables created by alembic'"

      - name: Run tests
        working-directory: backend
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=80

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt

      - name: Use Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --loglevel=error

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Smoke test (backend + built frontend)
        run: python scripts/smoke_test_ci.py
