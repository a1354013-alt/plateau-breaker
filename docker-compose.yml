services:
  plateaubreaker:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_TIMEZONE: "Asia/Taipei"
      PLATEAUBREAKER_DB_PATH: "/app/data/plateaubreaker.sqlite3"
      CORS_ORIGINS: "http://localhost:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

